<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>テラゾウの でんき予報 ｜ エリア別</title>
<style>
  :root{
    --bg:#FAFAF8; --card-bg:#F5F0E9; --ink:#4A4440; --muted:#9b8e7c;
    --yellow:#FAE14B; --amber:#E1AF00; --blue:#6496C8; --grid:#e3dccd;
    --lo:#185FA5; --hi:#993C1D; --line:#3A6FA5;
    --fill-lo:#E3EEF8; --fill-hi:#F7E7DF;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--ink); padding:18px 14px 48px;
    font-family:system-ui,"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
  }
  .wrap{max-width:480px; margin:0 auto;}
  .head{display:flex; align-items:center; gap:8px; margin-bottom:4px;}
  .brand-logo{height:64px; width:auto; margin-left:auto;}
  .avatar{height:40px;width:auto;display:block;}
  .head h1{font-size:18px; font-weight:600; margin:0;}
  .head .sub{font-size:12px; color:var(--muted);}
  /* 日付ナビ */
  .date-nav{display:flex; align-items:center; gap:8px; margin:4px 0 8px;}
  .nav-btn{border:1.5px solid #e1d8c7; background:#fff; color:#6b5f54; font-size:14px;
    min-width:32px; height:32px; border-radius:50%; cursor:pointer;
    display:flex; align-items:center; justify-content:center; padding:0;
    transition:.15s; flex-shrink:0; font-family:inherit;}
  .nav-btn:hover:not(:disabled){border-color:var(--amber);}
  .nav-btn:disabled{opacity:0.3; cursor:default;}
  .date-info{flex:1; text-align:center;}
  .date-text{font-size:13px; color:#6b5a00; font-weight:500;}
  .date-badge{font-size:10px; padding:2px 7px; border-radius:8px; margin-left:5px;
    font-weight:600; vertical-align:middle;}
  .badge-forecast{background:#6496C8; color:#fff;}
  .badge-confirmed{background:#5A9E2F; color:#fff;}
  .date-jump{font-size:11px; color:var(--muted); text-align:center; margin:-2px 0 12px;}
  .date-jump select{font-size:11px; border:1px solid #e1d8c7; border-radius:8px;
    padding:3px 8px; background:#fff; color:#6b5f54; font-family:inherit; cursor:pointer;
    max-width:220px; width:100%;}

  .selector{margin-bottom:14px;}
  .sel-label{font-size:12px; color:var(--muted); margin-bottom:7px;}
  .pills{display:flex; flex-wrap:wrap; gap:7px;}
  .pill{
    border:1.5px solid #e1d8c7; background:#fff; color:#6b5f54;
    font-size:13px; font-weight:500; padding:7px 13px; border-radius:20px;
    cursor:pointer; transition:.15s; font-family:inherit;
  }
  .pill:hover{border-color:var(--amber);}
  .pill.active{background:var(--amber); border-color:var(--amber); color:#fff;}

  .panel{background:var(--card-bg); border-radius:18px; padding:16px 16px 6px; margin-bottom:14px;}
  .panel-head{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:8px;}
  .panel-area{font-size:20px; font-weight:600;}
  .panel-tag{font-size:11px; color:#6b5a00; background:#fff; padding:3px 10px; border-radius:11px; font-weight:500;}
  .panel-level{font-size:13px; color:#fff; padding:4px 13px; border-radius:13px; font-weight:600;}
  .panel-level small{font-weight:400; font-size:11px; opacity:.9; margin-left:3px;}
  .chart{width:100%; height:auto; display:block;}

  .stats{display:flex; gap:10px; margin:10px 0 4px;}
  .stat{flex:1; border-radius:12px; padding:9px 12px;}
  .stat.lo{background:var(--fill-lo);} .stat.hi{background:var(--fill-hi);}
  .stat .t{font-size:11px; font-weight:600; margin-bottom:2px;}
  .stat.lo .t{color:var(--lo);} .stat.hi .t{color:var(--hi);}
  .stat .v{font-size:15px; font-weight:600;}
  .stat .v small{font-size:11px; font-weight:500; color:var(--muted);}

  .tip{border-radius:12px; padding:11px 13px; margin-bottom:10px;}
  .tip-good{background:#EAF2F9;}
  .tip-good .tt{font-size:12.5px;font-weight:600;color:var(--lo);margin-bottom:4px;}
  .tip-good .tb{font-size:12.5px;line-height:1.6;color:#2f4a63;}
  .tip-why{background:#fff;}
  .tip-why .tt{font-size:11px;font-weight:600;color:var(--amber);margin-bottom:3px;}
  .tip-why .tb{font-size:12.5px;line-height:1.65;color:var(--ink);}


  /* チャートラップ（ツールチップ用） */
  .chart-wrap{position:relative;}
  .chart-tooltip{
    position:absolute; pointer-events:none; display:none;
    background:rgba(74,68,64,0.92); color:#fff;
    font-size:12px; font-weight:600; padding:5px 10px;
    border-radius:8px; white-space:nowrap; z-index:10;
    box-shadow:0 2px 8px rgba(0,0,0,0.18);
  }
  /* ① 同一エリアノート */
  .same-note{
    font-size:11.5px; color:#5E83A0; background:#EAF2F9;
    border-radius:10px; padding:7px 12px; margin-top:6px;
    text-align:left; display:none; line-height:1.5;
  }
  .note{font-size:11px; color:var(--muted); line-height:1.6; text-align:center; margin-top:14px;}

  /* ビュー切替タブ */
  .view-tabs{display:flex; gap:6px; margin-bottom:14px; background:#efe8dc; padding:4px; border-radius:14px;}
  .view-tab{flex:1; border:none; background:transparent; color:#6b5f54; font-size:13px;
    font-weight:600; padding:8px 6px; border-radius:11px; cursor:pointer; transition:.15s;
    font-family:inherit;}
  .view-tab.active{background:#fff; color:var(--ink); box-shadow:0 1px 4px rgba(0,0,0,.08);}

  /* 月平均：サブ切替（季節性／トレンド） */
  .sub-tabs{display:flex; gap:7px; margin-bottom:12px;}
  .sub-tab{border:1.5px solid #e1d8c7; background:#fff; color:#6b5f54; font-size:12px;
    font-weight:500; padding:6px 14px; border-radius:16px; cursor:pointer; transition:.15s;
    font-family:inherit;}
  .sub-tab.active{background:var(--blue); border-color:var(--blue); color:#fff;}

  /* 予報くらべボックス */
  .compare-box{background:var(--card-bg); border-radius:16px; padding:14px 16px; margin-bottom:14px;}
  .compare-head{font-size:13px; font-weight:600; color:var(--ink); margin-bottom:10px;}
  .compare-head small{font-weight:400; color:var(--muted); font-size:11px;}
  .compare-row{display:flex; align-items:flex-end; gap:10px; margin-bottom:8px;}
  .compare-bar-wrap{flex:1;}
  .compare-bar-label{font-size:11px; color:#6b5f54; margin-bottom:3px; display:flex; justify-content:space-between;}
  .compare-bar-label b{font-weight:600; color:var(--ink);}
  .compare-bar{height:14px; border-radius:7px; background:#e3dccd; overflow:hidden;}
  .compare-bar span{display:block; height:100%; border-radius:7px;}
  .compare-verdict{font-size:13px; line-height:1.7; color:var(--ink); margin-top:10px;
    padding:10px 12px; border-radius:11px;}
  .verdict-low{background:#EAF2F9;}
  .verdict-mid{background:#FBF4DD;}
  .verdict-high{background:#F7E7DF;}

  .legend{display:flex; flex-wrap:wrap; gap:10px 14px; justify-content:center; margin-top:8px;}
  .legend-item{display:flex; align-items:center; gap:5px; font-size:11px; color:#6b5f54;}
  .legend-swatch{width:14px; height:3px; border-radius:2px;}
  .legend-dot{width:9px; height:9px; border-radius:50%;}
  .loading{text-align:center; color:var(--muted); font-size:13px; padding:40px 0;}
</style>
</head>

  east:{ action:"早朝と深夜が安めの日が多めです。洗濯・食洗機・炊飯予約・EV充電をこの時間に寄せると◎",
         why:"日中は冷暖房などで電気を使う人が増えて価格が上がるゾウ。早朝や深夜はみんなが休んでいて需要が落ち着くから狙い目だゾウ！" },
  solar:{ action:"晴れた日のお昼が大チャンス。洗濯・食洗機・お湯わかし・EV充電をお昼に寄せると◎",
          why:"太陽光発電が多い地域は、晴れたお昼に電気があり余って価格がぐっと下がるゾウ。夕方は太陽が沈んで需要も残るから高くなりやすいゾウ！" },
  mid:{ action:"朝〜午前と深夜が狙い目。洗濯・食洗機・炊飯予約・EV充電をこの時間に寄せると◎",
        why:"晴れたお昼は太陽光で価格が下がることがあるゾウ。逆に夕方は仕事や家事が重なって需要が集まり、高くなりやすいゾウ！" },
};
const COPY_MAP = {
  "北海道":"east","東北":"east","東京":"east",
  "中部":"mid","北陸":"mid","関西":"mid",
  "中国":"solar","四国":"solar","九州":"solar",
};

let DATA = null;
let AREAS = [];
let current = "関西";

// 日付管理
let allDates = [];    // [{raw, label, type:"forecast"|"confirmed"}, ...] 新しい順
let allDataMap = {};  // date_raw → {date_label, areas}
let currentDateIdx = 0;

const LEVELS = [
  {max:8,       label:"とてもおだやか", color:"#5A9E2F"},
  {max:11,       label:"おだやか",       color:"#8FB23A"},
  {max:17,       label:"ふつう",         color:"#E1AF00"},
  {max:35,       label:"高め",           color:"#EE8B1F"},
  {max:Infinity, label:"とても高め",     color:"#C0531E"},
];
function priceLevel(peak){ return LEVELS.find(l => peak < l.max); }

function slotToTime(i){ return Math.floor(i/2)+":"+(i%2?"30":"00"); }

function chart(prices){
  const W=440,H=210,L=34,R=12,T=14,B=26;
  const plotW=W-L-R, plotH=H-T-B;
  const yMax=Math.max(40, Math.ceil(Math.max(...prices)/10)*10);
  const x=i=>L+(i/47)*plotW;
  const y=p=>T+(1-p/yMax)*plotH;
  const minI=prices.indexOf(Math.min(...prices));
  const maxI=prices.indexOf(Math.max(...prices));

  let grid="";
  for(let v=0;v<=yMax;v+=10){
    const yy=y(v);
    grid+=`<line x1="${L}" y1="${yy}" x2="${W-R}" y2="${yy}" stroke="var(--grid)" stroke-width="1"/>`;
    grid+=`<text x="${L-5}" y="${yy+3.5}" text-anchor="end" font-size="10" fill="var(--muted)">${v}</text>`;
  }
  let xlab="";
  for(let h=0;h<=24;h+=3){
    const xx=L+(h/24)*plotW;
    grid+=`<line x1="${xx}" y1="${T}" x2="${xx}" y2="${T+plotH}" stroke="var(--grid)" stroke-width="${h%6===0?1:0.5}"/>`;
    if(h%6===0) xlab+=`<text x="${xx}" y="${H-8}" text-anchor="middle" font-size="10" fill="var(--muted)">${h}時</text>`;
  }
  const bandLo=`<rect x="${x(Math.max(0,minI-1))}" y="${T}" width="${x(minI+1)-x(Math.max(0,minI-1))}" height="${plotH}" fill="var(--fill-lo)" opacity="0.7"/>`;
  const bandHi=`<rect x="${x(Math.max(0,maxI-1))}" y="${T}" width="${x(maxI+1)-x(Math.max(0,maxI-1))}" height="${plotH}" fill="var(--fill-hi)" opacity="0.7"/>`;
  const linePts=prices.map((p,i)=>x(i).toFixed(1)+","+y(p).toFixed(1)).join(" ");
  const areaPts=`${L},${T+plotH} `+linePts+` ${W-R},${T+plotH}`;

  // ③ ツールチップ用：クロスヘア線・ドット・透明オーバーレイ
  const cross=`<line id="c-cross" x1="-999" y1="${T}" x2="-999" y2="${T+plotH}" stroke="var(--amber)" stroke-width="1.5" stroke-dasharray="3 3" opacity="0" pointer-events="none"/>`;
  const dot=`<circle id="c-dot" cx="-999" cy="-999" r="4.5" fill="var(--amber)" stroke="#fff" stroke-width="1.5" opacity="0" pointer-events="none"/>`;
  // prices を data 属性に埋め込む（JSON.stringify でエスケープ）
  const pdata=prices.map(v=>v.toFixed(2)).join(',');
  const overlay=`<rect x="${L}" y="${T}" width="${plotW}" height="${plotH}" fill="transparent" style="cursor:crosshair"
    data-prices="${pdata}" data-l="${L}" data-plotw="${plotW}" data-t="${T}" data-ploth="${plotH}" data-ymax="${yMax}"
    onmousemove="chartMove(event,this)" onmouseleave="chartLeave()"
    ontouchmove="chartTouch(event,this)" ontouchend="chartLeave()"/>`;

  return `<svg class="chart" viewBox="0 0 ${W} ${H}" style="overflow:visible">
    ${bandLo}${bandHi}${grid}${xlab}
    <polygon points="${areaPts}" fill="var(--line)" opacity="0.07"/>
    <polyline points="${linePts}" fill="none" stroke="var(--line)" stroke-width="2.4" stroke-linejoin="round"/>
    <circle cx="${x(minI)}" cy="${y(prices[minI])}" r="4.5" fill="var(--lo)"/>
    <circle cx="${x(maxI)}" cy="${y(prices[maxI])}" r="4.5" fill="var(--hi)"/>
    <text x="${x(minI)}" y="${y(prices[minI])+16}" text-anchor="middle" font-size="10" font-weight="600" fill="var(--lo)">最安</text>
    <text x="${x(maxI)}" y="${y(prices[maxI])-9}" text-anchor="middle" font-size="10" font-weight="600" fill="var(--hi)">最高</text>
    ${cross}${dot}${overlay}
  </svg>
  <div id="chart-tip" class="chart-tooltip"></div>`;
}

// ③ ツールチップ: マウス移動
function chartMove(e, el){
  const svg=el.closest('svg');
  const rect=svg.getBoundingClientRect();
  const scale=440/rect.width;
  const svgX=(e.clientX-rect.left)*scale;
  const L=+el.dataset.l, plotW=+el.dataset.plotw;
  const T=+el.dataset.t, plotH=+el.dataset.ploth, yMax=+el.dataset.ymax;
  const prices=el.dataset.prices.split(',').map(Number);
  const slot=Math.max(0,Math.min(47,Math.round((svgX-L)/plotW*47)));
  const price=prices[slot];
  const cx=(L+slot/47*plotW).toFixed(1);
  const cy=(T+(1-price/yMax)*plotH).toFixed(1);
  // クロスヘア更新
  const cr=svg.querySelector('#c-cross'), dt=svg.querySelector('#c-dot');
  if(cr){cr.setAttribute('x1',cx);cr.setAttribute('x2',cx);cr.setAttribute('opacity','0.7');}
  if(dt){dt.setAttribute('cx',cx);dt.setAttribute('cy',cy);dt.setAttribute('opacity','1');}
  // ツールチップ更新
  const h=Math.floor(slot/2), m=slot%2?'30':'00';
  const tip=document.getElementById('chart-tip');
  if(tip){
    tip.textContent=(h+':'+m.padStart(2,'0'))+' ／ '+price.toFixed(1)+' 円/kWh';
    tip.style.display='block';
    // 位置: SVG内クロスヘアをpx換算してラップ内に配置
    const wrap=svg.closest('.chart-wrap')||svg.parentElement;
    const wr=wrap.getBoundingClientRect();
    let lx=e.clientX-wr.left+12, ty=e.clientY-wr.top-32;
    // 右端はみ出し防止
    if(lx+120>wr.width) lx=e.clientX-wr.left-120;
    // 上端はみ出し防止（グラフ上部でラベルが見切れないように）
    if(ty<0) ty=e.clientY-wr.top+16;
    tip.style.left=lx+'px'; tip.style.top=ty+'px';
  }
}
// ③ ツールチップ: タッチ
function chartTouch(e, el){
  if(e.touches.length===0) return;
  e.preventDefault();
  chartMove({clientX:e.touches[0].clientX,clientY:e.touches[0].clientY},el);
}
// ③ ツールチップ: 非表示
function chartLeave(){
  const svg=document.querySelector('#p-chart svg');
  if(svg){
    const cr=svg.querySelector('#c-cross'),dt=svg.querySelector('#c-dot');
    if(cr) cr.setAttribute('opacity','0');
    if(dt) dt.setAttribute('opacity','0');
  }
  const tip=document.getElementById('chart-tip');
  if(tip) tip.style.display='none';
}

function updateDateNav(){
  const entry = allDates[currentDateIdx];
  if(!entry) return;
  document.getElementById("date-text").textContent = entry.label;
  const badge = document.getElementById("date-badge");
  if(entry.type === "forecast"){
    badge.textContent = "予報";
    badge.className = "date-badge badge-forecast";
  } else {
    badge.textContent = "確定";
    badge.className = "date-badge badge-confirmed";
  }
  document.getElementById("nav-prev").disabled = currentDateIdx >= allDates.length - 1;
  document.getElementById("nav-next").disabled = currentDateIdx <= 0;
  const sel = document.getElementById("date-select");
  if(sel) sel.value = currentDateIdx;
}

function render(){
  if(!DATA || !DATA.areas[current]) return;
  const pr=DATA.areas[current];
  const minI=pr.indexOf(Math.min(...pr));
  const maxI=pr.indexOf(Math.max(...pr));
  document.getElementById("p-area").textContent = current+"エリア";
  document.getElementById("p-chart").innerHTML = chart(pr);
  document.getElementById("p-lo").innerHTML = slotToTime(minI)+" <small>ごろ</small>";
  document.getElementById("p-hi").innerHTML = slotToTime(maxI)+" <small>ごろ</small>";
  const hiVal = Math.max(...pr);
  const lv = priceLevel(hiVal);
  const lvEl = document.getElementById("p-level");
  lvEl.innerHTML = lv.label + ' <small>最高'+Math.round(hiVal)+'円</small>';
  lvEl.style.background = lv.color;
  const copy = AREA_COPY[COPY_MAP[current]];
  document.getElementById("p-action").textContent = copy.action;
  document.getElementById("p-why").textContent = copy.why;
  document.querySelectorAll(".pill").forEach(b=>b.classList.toggle("active", b.dataset.area===current));
  updateDateNav();

  // ① 同一エリアプライス検知（北陸・関西など混雑なし日に同値になるケース）
  const sameNote = document.getElementById("p-same-note");
  if(sameNote && DATA){
    const prStr = pr.join(",");
    const sameAreas = Object.keys(DATA.areas).filter(a =>
      a !== current && DATA.areas[a].join(",") === prStr
    );
    if(sameAreas.length > 0){
      sameNote.textContent = "📌 本日は " + sameAreas.join("・") + " エリアと同一エリアプライスです（系統混雑なし）";
      sameNote.style.display = "block";
    } else {
      sameNote.style.display = "none";
    }
  }
}

function navigateTo(idx){
  if(idx < 0 || idx >= allDates.length) return;
  currentDateIdx = idx;
  DATA = allDataMap[allDates[idx].raw];
  AREAS = Object.keys(DATA.areas);
  if(!AREAS.includes(current)) current = AREAS[0];
  buildPills();
  render();
}

/* ============ 月平均ビュー ============ */
let MONTHLY = null;          // monthly.json
let FORECAST_RAW = null;     // 予報の date_raw（同月比較用）
let monthMode = "season";    // "season" | "trend"

const MONTH_LABELS = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
// 年ごとの線の色（季節性ビュー）
const YEAR_COLORS = ["#C9B79C","#9CC0A0","#6496C8","#E1AF00","#E07B53","#7B5EA0"];

// 月平均の折れ線チャート（汎用）
// series: [{name, color, points:[{x, y}], dashed, dotLast}], xLabels, yMaxHint
function lineChart(series, xLabels, opt){
  opt = opt || {};
  const W=440, H=230, L=38, R=14, T=14, B=30;
  const plotW=W-L-R, plotH=H-T-B;
  let allY = [];
  series.forEach(s => s.points.forEach(p => { if(p.y!=null) allY.push(p.y); }));
  const yMax = Math.max(opt.yMaxHint||10, Math.ceil(Math.max(...allY, 1)/5)*5);
  const n = xLabels.length;
  const xAt = i => L + (n<=1?0.5:i/(n-1))*plotW;
  const yAt = v => T + (1 - v/yMax)*plotH;

  let grid="";
  for(let v=0; v<=yMax; v+=5){
    const yy=yAt(v);
    grid+=`<line x1="${L}" y1="${yy}" x2="${W-R}" y2="${yy}" stroke="var(--grid)" stroke-width="1"/>`;
    grid+=`<text x="${L-5}" y="${yy+3.5}" text-anchor="end" font-size="10" fill="var(--muted)">${v}</text>`;
  }
  let xlab="";
  // 「年」を含むラベル（各年の起点）は必ず表示。それ以外は混み具合で間引く。
  const majorIdx = xLabels.map((l,i)=> /年/.test(l) ? i : -1).filter(i=>i>=0);
  const step = n>14 ? Math.ceil(n/12) : 1;
  for(let i=0;i<n;i++){
    const isMajor = majorIdx.includes(i);
    if(!isMajor && i % step !== 0) continue;
    const xx=xAt(i);
    const lab = xLabels[i];
    xlab+=`<text x="${xx}" y="${H-9}" text-anchor="middle" font-size="9.5" `
        + `fill="${isMajor?'#6b5f54':'var(--muted)'}" font-weight="${isMajor?600:400}">${lab}</text>`;
  }

  let paths="";
  series.forEach(s => {
    const pts = s.points.filter(p=>p.y!=null).map(p=>xAt(p.x).toFixed(1)+","+yAt(p.y).toFixed(1)).join(" ");
    if(!pts) return;
    paths += `<polyline points="${pts}" fill="none" stroke="${s.color}" stroke-width="${s.width||2.2}" `
          + `stroke-linejoin="round" stroke-linecap="round" ${s.dashed?'stroke-dasharray="5 4"':''} opacity="${s.opacity||1}"/>`;
    // 最終点を強調
    if(s.dotLast){
      const last = s.points.filter(p=>p.y!=null).slice(-1)[0];
      if(last) paths += `<circle cx="${xAt(last.x)}" cy="${yAt(last.y)}" r="4" fill="${s.color}"/>`;
    }
  });

  return `<svg class="chart" viewBox="0 0 ${W} ${H}">${grid}${xlab}${paths}</svg>`;
}

function renderMonthly(){
  if(!MONTHLY || !MONTHLY.areas[current]) return;
  const areaData = MONTHLY.areas[current];  // {"2022-01":12.3, ...}
  document.getElementById("m-area").textContent = current+"エリア";

  if(monthMode === "season"){
    renderSeason(areaData);
  } else {
    renderTrend(areaData);
  }
}

// 季節性：横軸=1〜12月、線=年ごと
function renderSeason(areaData){
  document.getElementById("m-tag").textContent = "月平均（年ごと）";
  // 年の一覧
  const years = [...new Set(MONTHLY.months.map(m=>m.split("-")[0]))].sort();
  const series = years.map((y, idx) => {
    const points = [];
    for(let mo=1; mo<=12; mo++){
      const key = `${y}-${String(mo).padStart(2,"0")}`;
      const v = areaData[key];
      points.push({x: mo-1, y: (v==null?null:v)});
    }
    return {name: y+"年", color: YEAR_COLORS[idx % YEAR_COLORS.length], points,
            width: (y===years[years.length-1]?2.8:1.8),
            opacity: (y===years[years.length-1]?1:0.65),
            dotLast: false};
  });
  document.getElementById("m-chart").innerHTML = lineChart(series, MONTH_LABELS, {});
  // 凡例
  const leg = document.getElementById("m-legend");
  leg.innerHTML = series.map(s =>
    `<span class="legend-item"><span class="legend-swatch" style="background:${s.color};height:${s.width>2?4:3}px"></span>${s.name}</span>`
  ).join("");

  document.getElementById("m-explain-tt").textContent = "この見方のポイント";
  document.getElementById("m-explain").textContent =
    "同じ月でも年によって価格はけっこう変わるゾウ。線が年ごとの月平均で、太い線がいちばん新しい年だゾウ。いまの時期が「例年より高め／安め」かを見るのに便利だゾウ！";
}

// トレンド：横軸=連続した月、1本線
function renderTrend(areaData){
  document.getElementById("m-tag").textContent = "月平均（推移）";
  const months = MONTHLY.months;
  const points = months.map((ym, i) => ({x:i, y: (areaData[ym]==null?null:areaData[ym])}));
  const labels = months.map(ym => {
    const [y,mo] = ym.split("-");
    return (mo==="01") ? `${y.slice(2)}年` : `${parseInt(mo)}`;
  });
  const series = [{name:"月平均", color:"var(--blue)", points, width:2.4, dotLast:true}];
  document.getElementById("m-chart").innerHTML = lineChart(series, labels, {});
  const leg = document.getElementById("m-legend");
  leg.innerHTML = `<span class="legend-item"><span class="legend-swatch" style="background:#6496C8;height:3px"></span>月平均エリアプライス</span>`
    + `<span class="legend-item"><span class="legend-dot" style="background:#6496C8"></span>最新月</span>`;

  document.getElementById("m-explain-tt").textContent = "この見方のポイント";
  document.getElementById("m-explain").textContent =
    "2022年1月からの月平均をそのまま並べたゾウ。電気の市場価格が長い目で上がっているのか下がっているのか、大きな流れがわかるゾウ！";
}

// あすの予報 vs 過去の同じ月の平均
function renderCompare(){
  const box = document.getElementById("compare-box");
  const fcData = (FORECAST_RAW && allDataMap[FORECAST_RAW]) ? allDataMap[FORECAST_RAW] : null;
  if(!MONTHLY || !FORECAST_RAW || !fcData || !fcData.areas[current]){
    box.style.display = "none";
    return;
  }
  box.style.display = "block";

  // 予報日の月平均（48コマ平均）
  const fc = fcData.areas[current];
  const fcAvg = fc.reduce((a,b)=>a+b,0) / fc.length;
  // 予報日の月（"YYYY/MM/DD" → "MM"）
  const parts = FORECAST_RAW.split("/");
  const moNum = parseInt(parts[1]);
  const moKey = parts[1];

  // 過去の同じ月（予報日より前の年・同月）の平均を集める
  const areaData = MONTHLY.areas[current];
  const fcYM = `${parts[0]}-${moKey}`;  // 予報の年月
  const pastVals = [];
  Object.keys(areaData).forEach(ym => {
    const [y,mo] = ym.split("-");
    // 同じ月 かつ 予報の年月より前（＝過去）
    if(mo === moKey && ym < fcYM){
      pastVals.push(areaData[ym]);
    }
  });

  document.getElementById("compare-head").innerHTML =
    `あすの予報は、過去の${moNum}月とくらべて？ <small>（${current}エリア）</small>`;

  const barsEl = document.getElementById("compare-bars");
  const verdictEl = document.getElementById("compare-verdict");

  if(pastVals.length === 0){
    barsEl.innerHTML = "";
    verdictEl.className = "compare-verdict verdict-mid";
    verdictEl.textContent = "過去の同じ月のデータがまだ少なくて、くらべられないゾウ。";
    return;
  }

  const pastAvg = pastVals.reduce((a,b)=>a+b,0) / pastVals.length;
  const scale = Math.max(fcAvg, pastAvg) * 1.15;
  const pct = v => Math.min(100, (v/scale)*100);

  barsEl.innerHTML =
    `<div class="compare-bar-wrap">
       <div class="compare-bar-label"><span>あすの予報（${moNum}月）</span><b>${fcAvg.toFixed(1)}円</b></div>
       <div class="compare-bar"><span style="width:${pct(fcAvg)}%;background:var(--amber)"></span></div>
     </div>
     <div style="height:8px"></div>
     <div class="compare-bar-wrap">
       <div class="compare-bar-label"><span>過去の${moNum}月平均（${pastVals.length}年分）</span><b>${pastAvg.toFixed(1)}円</b></div>
       <div class="compare-bar"><span style="width:${pct(pastAvg)}%;background:#9b8e7c"></span></div>
     </div>`;

  const diff = fcAvg - pastAvg;
  const ratio = diff / pastAvg;
  let cls, msg;
  if(ratio <= -0.1){
    cls = "verdict-low";
    msg = `あすは過去の${moNum}月平均より${Math.abs(diff).toFixed(1)}円ほど安めの見込みだゾウ。ねらい目の時間に家事を寄せるとさらにお得だゾウ！`;
  } else if(ratio >= 0.1){
    cls = "verdict-high";
    msg = `あすは過去の${moNum}月平均より${diff.toFixed(1)}円ほど高めの見込みだゾウ。安い時間帯を上手に使っていくゾウ！`;
  } else {
    cls = "verdict-mid";
    msg = `あすは過去の${moNum}月平均とだいたい同じくらいの見込みだゾウ。いつもどおり安い時間帯がねらい目だゾウ！`;
  }
  verdictEl.className = "compare-verdict " + cls;
  verdictEl.textContent = msg;
}

function switchView(mode){
  const daily = document.getElementById("view-daily");
  const monthly = document.getElementById("view-monthly");
  const navWrap = document.querySelector(".date-nav");
  const jumpWrap = document.querySelector(".date-jump");
  document.getElementById("tab-daily").classList.toggle("active", mode==="daily");
  document.getElementById("tab-monthly").classList.toggle("active", mode==="monthly");
  if(mode==="daily"){
    daily.style.display = "block";
    monthly.style.display = "none";
    if(navWrap) navWrap.style.display = "flex";
    if(jumpWrap) jumpWrap.style.display = "block";
  } else {
    daily.style.display = "none";
    monthly.style.display = "block";
    // 日付ナビは日次専用なので隠す
    if(navWrap) navWrap.style.display = "none";
    if(jumpWrap) jumpWrap.style.display = "none";
    renderCompare();
    renderMonthly();
  }
}

function switchMonthMode(mode){
  monthMode = mode;
  document.getElementById("sub-season").classList.toggle("active", mode==="season");
  document.getElementById("sub-trend").classList.toggle("active", mode==="trend");
  renderMonthly();
}

function buildPills(){
  const pills=document.getElementById("pills");
  pills.innerHTML="";
  AREAS.forEach(a=>{
    const b=document.createElement("button");
    b.className="pill"; b.textContent=a; b.dataset.area=a;
    b.onclick=()=>{ current=a; render(); renderCompare(); renderMonthly(); };
    pills.appendChild(b);
  });
}

function buildDateSelect(){
  const sel = document.getElementById("date-select");
  sel.innerHTML = "";
  allDates.forEach((entry, i) => {
    const opt = document.createElement("option");
    opt.value = i;
    opt.textContent = entry.label + (entry.type === "forecast" ? "（予報）" : "（確定）");
    sel.appendChild(opt);
  });
  sel.value = currentDateIdx;
  sel.onchange = () => navigateTo(parseInt(sel.value));
}

async function init(){
  try{
    const res = await fetch("prices.json?_="+Date.now());
    if(!res.ok) throw new Error("prices.json の取得に失敗しました");
    const priceData = await res.json();

    // prices.json（明日の予報）を登録
    allDataMap[priceData.date_raw] = {date_label: priceData.date_label, areas: priceData.areas};
    allDates.push({raw: priceData.date_raw, label: priceData.date_label, type: "forecast"});

    // history.json（過去の確定データ）をフェッチ（失敗してもOK）
    try{
      const hRes = await fetch("history.json?_="+Date.now());
      if(hRes.ok){
        const hData = await hRes.json();
        hData.dates.forEach(d => {
          if(!allDataMap[d]){  // prices.jsonと重複しない日付のみ
            allDataMap[d] = hData.data[d];
            allDates.push({raw: d, label: hData.data[d].date_label, type: "confirmed"});
          }
        });
      }
    }catch(e){ /* history.jsonが無くても問題なし */ }

    // 新しい順に並べる
    allDates.sort((a,b) => b.raw.localeCompare(a.raw));

    // 予報日を記録（月平均比較で使う）
    FORECAST_RAW = priceData.date_raw;

    // monthly.json（月平均、2022年〜）をフェッチ（失敗してもOK）
    try{
      const mRes = await fetch("monthly.json?_="+Date.now());
      if(mRes.ok){
        MONTHLY = await mRes.json();
      }
    }catch(e){ /* monthly.jsonが無くても日次ビューは動く */ }

    // monthly.json が無ければ「月平均でくらべる」タブを隠す
    if(!MONTHLY){
      document.getElementById("tab-monthly").style.display = "none";
      document.querySelector(".view-tabs").style.display = "none";
    }

    // デフォルトは最新（予報）
    currentDateIdx = 0;
    DATA = allDataMap[allDates[0].raw];
    AREAS = Object.keys(DATA.areas);
    if(!AREAS.includes(current)) current = AREAS[0];

    buildPills();
    buildDateSelect();
    render();

    // ◀ ▶ ボタン
    document.getElementById("nav-prev").addEventListener("click", () => navigateTo(currentDateIdx + 1));
    document.getElementById("nav-next").addEventListener("click", () => navigateTo(currentDateIdx - 1));

    // ビュー切替タブ
    document.getElementById("tab-daily").addEventListener("click", () => switchView("daily"));
    document.getElementById("tab-monthly").addEventListener("click", () => switchView("monthly"));
    document.getElementById("sub-season").addEventListener("click", () => switchMonthMode("season"));
    document.getElementById("sub-trend").addEventListener("click", () => switchMonthMode("trend"));

    document.getElementById("loading").style.display="none";
    document.getElementById("content").style.display="block";
  }catch(e){
    document.getElementById("loading").textContent = "データを読み込めませんでした。しばらくしてから再度お試しください。";
  }
}
init();
</script>
</body>
</html>
