name: でんき予報 デイリー生成（自動）
# 起動タイミング：
#  - cron-job.org からの workflow_dispatch（実運用の主役）
#  - 毎朝 10:40 / 11:10 / 11:40 JST のネイティブ cron（GitHub遅延対策の予備）
#    → どちらの自動起動でも「当日まだ未配信なら実処理／配信済みならスキップ」。
#      配信済みマーカー（docs/.last_run）は Instagram 投稿の成功後にのみ書く。
#  - data/spot_summary.csv を更新push したとき（手動差し替え時のフォールバック）
#  - 手動で再配信したいときだけ Run workflow → force=true でガードを無視
#
#  ★今回の修正点（3連投の再発防止）
#   (1) workflow_dispatch も原則ガードを尊重する。
#       以前は workflow_dispatch を無条件で素通ししていたため、
#       cron-job.org の複数dispatchが全部投稿してしまっていた。
#       手動の強制再配信は inputs.force=true のときだけ許可する。
#   (2) concurrency で同時並走を禁止（同時刻トリガの重複投稿を防ぐ最後の砦）。
#   (3) マーカー記録ステップ⑨を、変更が無くても落ちない／push競合に強い形へ。
on:
  schedule:
    - cron: '40 1 * * *'   # 10:40 JST
    - cron: '10 2 * * *'   # 11:10 JST
    - cron: '40 2 * * *'   # 11:40 JST
  push:
    paths:
      - 'data/spot_summary.csv'
  workflow_dispatch:
    inputs:
      force:
        description: '配信済みでも強制的に再配信する（手動で出し直したいときだけ true）'
        type: boolean
        default: false

permissions:
  contents: write   # 生成したPNG/JSONを docs/ にコミットするため

# 同じ日に複数トリガが重なっても、絶対に同時並走させない（重複投稿の最後の砦）。
# 走っている分が終わってから次が動き、そのとき改めてガード判定し直す。
concurrency:
  group: denki-yohou-daily
  cancel-in-progress: false

jobs:
  # 当日すでに配信済みかを判定（複数トリガの重複実行を防ぐ）
  guard:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          TODAY=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          if [ -f docs/.last_run ] && [ "$(cat docs/.last_run)" = "$TODAY" ]; then
            echo "本日（$TODAY）は配信済み。スキップします。"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "本日（$TODAY）は未配信。実行します。"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  build-and-notify:
    needs: guard
    # 自動起動（cron / cron-job.org の workflow_dispatch）は「当日未配信」のときだけ。
    # 手動で再配信したいときは Run workflow → force=true でガード無視。
    # CSV手動差し替え（push）はフォールバックなので常に実行。
    if: >-
      needs.guard.outputs.should_run == 'true'
      || (github.event_name == 'workflow_dispatch' && github.event.inputs.force == 'true')
      || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: チェックアウト
        uses: actions/checkout@v4
      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 依存インストール（Playwright + Chromium + requests）
        run: |
          pip install playwright requests
          playwright install --with-deps chromium
      - name: ⓪ JEPXから最新CSVを取得
        run: python scripts/fetch_jepx.py
      - name: ① prices.json を生成（鮮度チェック付き）
        # --require-tomorrow：CSVの最新日ではなく「あした（JST）」を明示要求。
        # あしたのデータがまだ無ければここで失敗し、古いデータの再配信を防ぐ。
        # マーカー未記録のまま終わるので、後続の起動が自動でリトライする。
        run: python scripts/build_prices.py --require-tomorrow
      - name: ①' history.json を生成（過去データ、Web表示用）
        # prices.json と異なり失敗してもフローを止めない（追加機能のため）
        continue-on-error: true
        run: python scripts/build_history.py
      - name: ①'' monthly.json を更新（月平均くらべ、Web表示用）
        # マージモード：既存 docs/monthly.json に当年度ぶんだけ反映する。
        # 過去年度CSVはリポジトリに持たない方針（正本はJEPX）。過去の月は保持される。
        # 失敗してもフローは止めない。
        continue-on-error: true
        run: python scripts/build_monthly.py
      - name: ② stories.html を生成
        run: python scripts/build_stories.py
      - name: ③ PNG（5枚）を書き出し
        run: python scripts/render_png.py stories.html
      - name: ④ 公開ディレクトリ（docs/）へ配置
        run: |
          mkdir -p docs/stories
          cp stories_*.png docs/stories/
          cp prices.json   docs/prices.json
          [ -f history.json ] && cp history.json docs/history.json || true
          [ -f monthly.json ] && cp monthly.json docs/monthly.json || true
      - name: ⑤ コミット＆プッシュ（GitHub Pages 公開）
        run: |
          git config user.name  "tera-denki-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/ data/spot_summary.csv
          git diff --cached --quiet && echo "変更なし（スキップ）" \
            || git commit -m "でんき予報 $(TZ=Asia/Tokyo date +%Y-%m-%d) [skip ci]"
          git push origin HEAD:main \
            || (git pull --rebase --autostash origin main && git push origin HEAD:main)
      - name: ⑥ Pages 反映待ち（prices.json の日付で実確認）
        # 固定 sleep だとデプロイ遅延時に旧画像をIG側が掴むため、
        # 公開URLの prices.json が今回の日付になるまでポーリングする（最大5分）。
        run: |
          EXPECTED=$(python -c "import json; print(json.load(open('prices.json'))['date_raw'])")
          echo "期待する配信日: $EXPECTED"
          for i in $(seq 1 20); do
            LIVE=$(curl -fsSL "${{ vars.PAGES_BASE_URL }}/prices.json?nocache=$(date +%s)" \
                   | python -c "import json,sys; print(json.load(sys.stdin).get('date_raw',''))" \
                   2>/dev/null || echo "")
            if [ "$LIVE" = "$EXPECTED" ]; then
              echo "Pages 反映を確認しました（$LIVE）"
              exit 0
            fi
            echo "  反映待ち ($i/20)… 公開中: '$LIVE'"
            sleep 15
          done
          echo "::error::Pages の反映を5分以内に確認できませんでした。"
          exit 1
      - name: ⑦ IGトークンの残り日数チェック（失効14日前からSlack警告）
        # お知らせ専用。チェック自体が失敗しても配信は止めない。
        continue-on-error: true
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python scripts/check_ig_token.py
      - name: ⑧ Instagram Stories へ投稿
        id: instagram
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          PAGES_BASE_URL: ${{ vars.PAGES_BASE_URL }}
        run: python scripts/post_instagram_stories.py
      - name: ⑨ 配信済みマーカーを記録（IG投稿の成功後のみ）
        # ここまで到達＝Instagram投稿まで成功。マーカーを書いて当日分を完了扱いに。
        # 既に今日の日付なら commit をスキップ（旧版は exit 1 で赤くなっていた）。
        # push が競合した場合は rebase してから再push（同時起動への保険）。
        run: |
          TZ=Asia/Tokyo date +%Y-%m-%d > docs/.last_run
          git config user.name  "tera-denki-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/.last_run
          git diff --cached --quiet && echo "マーカー変更なし（既に記録済み）" \
            || git commit -m "配信済みマーカー $(TZ=Asia/Tokyo date +%Y-%m-%d) [skip ci]"
          git push origin HEAD:main \
            || (git pull --rebase --autostash origin main && git push origin HEAD:main)
      - name: ⑩ Slack へ通知（安否確認・失敗しても本体に影響させない）
        if: always()              # 途中のステップが失敗した日こそ必ず通知する
        continue-on-error: true   # Slack自体の失敗でジョブを赤にしない
        timeout-minutes: 2        # かつての約20分ハングの再発防止（強制打ち切り）
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PAGES_BASE_URL: ${{ vars.PAGES_BASE_URL }}
          IG_RESULT: ${{ steps.instagram.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python scripts/notify_slack.py
