name: でんき予報 デイリー生成（半自動）

# 起動タイミング：
#  - 毎晩 18:00 JST（= 09:00 UTC）。翌日エリアプライス確定後の想定。
#    JEPX/CISの確定時刻に合わせて cron を調整してください。
#  - data/spot_summary.csv を更新push したとき（CIS連携 or 手動差し替え）
#  - 手動実行（Actions画面の Run workflow）
on:
  schedule:
    - cron: '0 9 * * *'
  push:
    paths:
      - 'data/spot_summary.csv'
  workflow_dispatch:

permissions:
  contents: write   # 生成したPNG/JSONを docs/ にコミットするため

jobs:
  build-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存インストール（Playwright + Chromium）
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: ① prices.json を生成
        run: python scripts/build_prices.py

      - name: ② stories.html を生成
        run: python scripts/build_stories.py

      - name: ③ PNG（5枚）を書き出し
        run: python scripts/render_png.py stories.html

      - name: ④ 公開ディレクトリ（docs/）へ配置
        run: |
          mkdir -p docs/stories
          cp stories_*.png docs/stories/
          cp prices.json   docs/prices.json

      - name: ⑤ コミット＆プッシュ（GitHub Pages 公開）
        run: |
          git config user.name  "tera-denki-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/
          git commit -m "でんき予報 $(date -u +%Y-%m-%d)" || echo "変更なし（スキップ）"
          git push

      - name: Pages 反映待ち
        run: sleep 45

      - name: ⑥ Slack へ通知
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PAGES_BASE_URL: ${{ vars.PAGES_BASE_URL }}
        run: python scripts/notify_slack.py
